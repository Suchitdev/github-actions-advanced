name: Docker Build Push

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Pytest
      run: |
        pip install pytest

    - name: Run Tests
      run: |
        pytest

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build Image
      run: |
        docker build -t suchit10/github-actions:${{ github.run_number }} .

    - name: Push Image
      run: |
        docker push suchit10/github-actions:${{ github.run_number }}